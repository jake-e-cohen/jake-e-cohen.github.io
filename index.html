<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>I like asters</title>
        <link rel="stylesheet" href="./styles/styles.css" type="text/css">
        <link rel="stylesheet" href="./styles/index.css" type="text/css">
    </head>
    <body>
        <div id="content">
            <a href="./about.html" class="link">
                <img src="./src/icon-1.png" alt="a pink aster">
                <span>About</a>
            </a>
            <main>
                <img src="./src/header-icon.png" alt="a sunflower">
                <header>
                    <h1>I like asters</h1>
                    <h2>A plant-covered patch of the internet</h2>
                </header>
            </main>
            <a href="#" class="link todo">
                <img src="./src/icon-2.png" alt="a daisy">
                <span>Gallery</a>
            </a>
        </div>

        <button id="play-pause" title="play music">
            <img src="./src/play.png" alt="play">
        </button>

        <audio>
            <source src="./Trammell Starks - All That Jazz.mp3">
        </audio>

        <script src="./scripts/music.js" type="text/javascript"></script>
        <script>
            const todos = document.querySelectorAll(".todo");
            Array.from(todos).forEach(todo => {
                todo.addEventListener("click", () => alert("Under construction! Check back later."));
            });
        </script>
    </body>
</html>
